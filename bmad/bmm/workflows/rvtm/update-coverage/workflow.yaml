name: update-coverage
version: "1.0.0"
description: Update RVTM test coverage and traceability data
category: rvtm
phase: execution
tags:
  - testing
  - coverage
  - traceability
  - continuous

inputs:
  project_root:
    type: string
    description: Root directory of the project
    required: true
    default: "."

  test_results:
    type: object
    description: Test execution results to update
    required: false

  story_updates:
    type: object
    description: Story status updates
    required: false

  requirement_changes:
    type: array
    description: Requirement modifications
    required: false

  auto_detect:
    type: boolean
    description: Automatically detect changes from Git
    required: false
    default: true

outputs:
  coverage_percentage:
    type: number
    description: Updated coverage percentage

  verification_percentage:
    type: number
    description: Updated verification percentage

  gaps_identified:
    type: number
    description: Number of coverage gaps found

  risks_identified:
    type: number
    description: Number of risks identified

  report_path:
    type: string
    description: Path to updated coverage report

steps:
  - id: verify_rvtm
    name: Verify RVTM exists
    type: shell
    command: |
      if [ ! -d ".rvtm" ]; then
        echo "❌ RVTM not initialized. Run 'bmad rvtm init' first."
        exit 1
      fi
    continue_on_error: false

  - id: detect_changes
    name: Detect changes from Git
    type: node
    script: |
      const { execSync } = require('child_process');

      if (inputs.auto_detect) {
        try {
          // Detect modified story files
          const storyChanges = execSync('git diff --name-only | grep -E "stories/.*\\.md$" || true', { encoding: 'utf-8' });

          // Detect test result changes
          const testChanges = execSync('git diff --name-only | grep -E "test.*\\.json$|test-results.*" || true', { encoding: 'utf-8' });

          // Detect requirement changes
          const reqChanges = execSync('git diff --name-only | grep -E "docs/(prd|epics)/.*\\.md$" || true', { encoding: 'utf-8' });

          console.log('Changes detected:');
          if (storyChanges) console.log('  - Story files:', storyChanges.split('\n').filter(Boolean).length);
          if (testChanges) console.log('  - Test results:', testChanges.split('\n').filter(Boolean).length);
          if (reqChanges) console.log('  - Requirements:', reqChanges.split('\n').filter(Boolean).length);
        } catch (err) {
          console.log('No changes detected via Git');
        }
      }
    dependencies:
      - verify_rvtm
    continue_on_error: true

  - id: update_test_results
    name: Update test execution results
    type: node
    script: |
      const RVTMManager = require('../../../core/lib/rvtm/rvtm-manager');
      const manager = new RVTMManager(inputs.project_root);
      await manager.loadMatrix();

      let updatedTests = 0;

      if (inputs.test_results) {
        for (const [testId, result] of Object.entries(inputs.test_results)) {
          await manager.updateTestResult(testId, {
            status: result.status,
            last_execution: new Date().toISOString(),
            ...result
          });
          updatedTests++;
        }
      }

      // Auto-detect test results from common locations
      if (inputs.auto_detect) {
        const fs = require('fs-extra');
        const path = require('path');

        // Check for Jest results
        const jestResultPath = path.join(inputs.project_root, 'test-results.json');
        if (await fs.pathExists(jestResultPath)) {
          const jestResults = await fs.readJson(jestResultPath);
          // Process Jest results...
          console.log('Processing Jest results...');
        }

        // Check for Mocha results
        const mochaResultPath = path.join(inputs.project_root, 'mochawesome-report', 'mochawesome.json');
        if (await fs.pathExists(mochaResultPath)) {
          const mochaResults = await fs.readJson(mochaResultPath);
          // Process Mocha results...
          console.log('Processing Mocha results...');
        }
      }

      console.log(`✅ Updated ${updatedTests} test results`);
    dependencies:
      - detect_changes

  - id: update_story_status
    name: Update story implementation status
    type: node
    script: |
      const RVTMManager = require('../../../core/lib/rvtm/rvtm-manager');
      const manager = new RVTMManager(inputs.project_root);
      await manager.loadMatrix();

      let updatedStories = 0;

      if (inputs.story_updates) {
        for (const [storyId, updates] of Object.entries(inputs.story_updates)) {
          if (updates.status) {
            await manager.updateStoryStatus(storyId, updates.status);
            updatedStories++;
          }
        }
      }

      console.log(`✅ Updated ${updatedStories} story statuses`);
    dependencies:
      - update_test_results

  - id: process_requirement_changes
    name: Process requirement changes
    type: node
    script: |
      const RVTMManager = require('../../../core/lib/rvtm/rvtm-manager');
      const manager = new RVTMManager(inputs.project_root);
      await manager.loadMatrix();

      let impactedItems = [];

      if (inputs.requirement_changes && inputs.requirement_changes.length > 0) {
        for (const change of inputs.requirement_changes) {
          const result = await manager.updateRequirement(change.id, change.updates);
          if (result.impact) {
            impactedItems.push({
              requirement: change.id,
              impact: result.impact
            });
          }
        }

        console.log(`⚠️ ${impactedItems.length} requirements changed with impact analysis`);

        // Output impact summary
        for (const item of impactedItems) {
          console.log(`  - ${item.requirement}:`);
          console.log(`    Affected stories: ${item.impact.affected_stories.length}`);
          console.log(`    Affected tests: ${item.impact.affected_tests.length}`);
          console.log(`    Risk: ${item.impact.risk_level}`);
        }
      }
    dependencies:
      - update_story_status

  - id: calculate_coverage
    name: Calculate updated coverage metrics
    type: node
    script: |
      const RVTMManager = require('../../../core/lib/rvtm/rvtm-manager');
      const CoverageCalculator = require('../../../core/lib/rvtm/coverage-calculator');

      const manager = new RVTMManager(inputs.project_root);
      await manager.loadMatrix();

      const calculator = new CoverageCalculator(manager);
      const coverage = await calculator.calculateCoverage();

      outputs.coverage_percentage = coverage.coverage_percentage;
      outputs.verification_percentage = coverage.verification_percentage;
      outputs.gaps_identified = coverage.gaps.length;
      outputs.risks_identified = coverage.risks.length;

      console.log('\n📊 Coverage Metrics Updated:');
      console.log(`  Coverage: ${coverage.coverage_percentage}%`);
      console.log(`  Verification: ${coverage.verification_percentage}%`);
      console.log(`  Implementation: ${coverage.implementation_percentage}%`);
      console.log(`  Gaps: ${coverage.gaps.length}`);
      console.log(`  Risks: ${coverage.risks.length}`);
    dependencies:
      - process_requirement_changes

  - id: validate_thresholds
    name: Validate coverage against thresholds
    type: node
    script: |
      const RVTMManager = require('../../../core/lib/rvtm/rvtm-manager');
      const CoverageCalculator = require('../../../core/lib/rvtm/coverage-calculator');

      const manager = new RVTMManager(inputs.project_root);
      await manager.loadMatrix();

      const calculator = new CoverageCalculator(manager);
      const validation = await calculator.validateCoverage();

      if (!validation.passed) {
        console.log(`\n⚠️ WARNING: ${validation.message}`);
        console.log('  Consider adding more tests to meet coverage requirements');
      } else {
        console.log(`\n✅ ${validation.message}`);
      }
    dependencies:
      - calculate_coverage

  - id: identify_gaps
    name: Identify coverage gaps and orphans
    type: node
    script: |
      const RVTMManager = require('../../../core/lib/rvtm/rvtm-manager');
      const CoverageCalculator = require('../../../core/lib/rvtm/coverage-calculator');

      const manager = new RVTMManager(inputs.project_root);
      await manager.loadMatrix();

      const calculator = new CoverageCalculator(manager);

      // Find orphaned tests
      const orphaned = await calculator.findOrphanedTests();
      if (orphaned.length > 0) {
        console.log(`\n⚠️ Found ${orphaned.length} orphaned tests:`);
        for (const test of orphaned.slice(0, 5)) {
          console.log(`  - ${test.id}: ${test.reason}`);
        }
        if (orphaned.length > 5) {
          console.log(`  ... and ${orphaned.length - 5} more`);
        }
      }

      // Find uncovered requirements
      const uncovered = await calculator.findUncoveredRequirements();
      if (uncovered.length > 0) {
        console.log(`\n⚠️ Found ${uncovered.length} uncovered requirements:`);
        for (const req of uncovered.slice(0, 5)) {
          console.log(`  - ${req.id} [${req.priority}]: Missing ${req.missing.stories ? 'stories' : ''} ${req.missing.tests ? 'tests' : ''}`);
        }
        if (uncovered.length > 5) {
          console.log(`  ... and ${uncovered.length - 5} more`);
        }
      }
    dependencies:
      - validate_thresholds

  - id: generate_report
    name: Generate updated coverage report
    type: node
    script: |
      const RVTMManager = require('../../../core/lib/rvtm/rvtm-manager');
      const ReportGenerator = require('../../../core/lib/rvtm/report-generator');
      const path = require('path');
      const fs = require('fs-extra');

      const manager = new RVTMManager(inputs.project_root);
      await manager.loadMatrix();

      const reportGen = new ReportGenerator(manager);

      // Generate detailed report
      const report = await reportGen.generateReport({
        includeCoverage: true,
        highlightGaps: true
      });

      const timestamp = new Date().toISOString().replace(/[:.]/g, '-');
      const reportPath = path.join(manager.rvtmPath, 'reports', 'latest', 'coverage-update.md');
      await fs.writeFile(reportPath, report);

      // Archive with timestamp
      const archivePath = path.join(manager.rvtmPath, 'reports', 'archive', `coverage-${timestamp}.md`);
      await fs.copy(reportPath, archivePath);

      // Generate JSON report
      const jsonPath = path.join(manager.rvtmPath, 'reports', 'latest', 'coverage-update.json');
      await reportGen.exportReport('json', jsonPath);

      outputs.report_path = reportPath;
      console.log(`\n✅ Coverage report generated: ${reportPath}`);
    dependencies:
      - identify_gaps

  - id: update_dashboard
    name: Update coverage dashboard
    type: node
    script: |
      const RVTMManager = require('../../../core/lib/rvtm/rvtm-manager');
      const CoverageCalculator = require('../../../core/lib/rvtm/coverage-calculator');
      const path = require('path');
      const fs = require('fs-extra');

      const manager = new RVTMManager(inputs.project_root);
      await manager.loadMatrix();

      const calculator = new CoverageCalculator(manager);
      const summary = await calculator.generateCoverageSummary();

      // Create simple dashboard
      const dashboard = `# RVTM Coverage Dashboard

Last Updated: ${summary.timestamp}

## Quick Stats
- **Coverage:** ${summary.metrics.coverage_percentage}% ${summary.metrics.coverage_percentage >= 90 ? '✅' : summary.metrics.coverage_percentage >= 70 ? '🟡' : '🔴'}
- **Verification:** ${summary.metrics.verification_percentage}%
- **Implementation:** ${summary.metrics.implementation_percentage}%

## Health Indicators
- Orphaned Tests: ${summary.health.orphaned_tests}
- Uncovered Requirements: ${summary.health.uncovered_requirements}
- Critical Gaps: ${summary.health.critical_gaps}
- High Risks: ${summary.health.high_risks}

## Status: ${summary.status.toUpperCase()}

## Recommendation
${summary.recommendation}
`;

      const dashboardPath = path.join(manager.rvtmPath, 'reports', 'dashboard.md');
      await fs.writeFile(dashboardPath, dashboard);

      console.log('✅ Dashboard updated');
    dependencies:
      - generate_report

  - id: summary
    name: Display update summary
    type: shell
    script: |
      echo ""
      echo "════════════════════════════════════════════════════════"
      echo "    RVTM Coverage Update Complete"
      echo "════════════════════════════════════════════════════════"
      echo ""
      echo "📊 Coverage: ${outputs.coverage_percentage}%"
      echo "✅ Verification: ${outputs.verification_percentage}%"
      echo "⚠️  Gaps: ${outputs.gaps_identified}"
      echo "🔴 Risks: ${outputs.risks_identified}"
      echo "📄 Report: ${outputs.report_path}"
      echo ""
    dependencies:
      - update_dashboard

error_handling:
  on_failure: continue
  notify:
    - type: log
      message: "RVTM coverage update failed - manual intervention may be required"

validation:
  pre_conditions:
    - name: RVTM initialized
      command: test -d .rvtm
      error_message: "RVTM must be initialized first"

  post_conditions:
    - name: Report generated
      command: test -f .rvtm/reports/latest/coverage-update.md
      error_message: "Coverage report was not generated"
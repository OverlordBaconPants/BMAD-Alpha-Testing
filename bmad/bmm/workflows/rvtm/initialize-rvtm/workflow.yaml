name: initialize-rvtm
version: "2.0.0"
description: Initialize Requirements Verification Traceability Matrix (RVTM) for project using MD/YAML architecture
category: rvtm
phase: initialization
tags:
  - traceability
  - requirements
  - quality
  - compliance
  - bmad-native

inputs:
  project_root:
    type: string
    description: Root directory of the project
    required: false
    default: "."

  prd_file:
    type: string
    description: Path to PRD file to extract initial requirements (optional)
    required: false
    default: ""

outputs:
  rvtm_path:
    type: string
    description: Path to RVTM directory

  matrix_file:
    type: string
    description: Path to matrix.yaml file

  requirements_count:
    type: number
    description: Number of requirements imported (if PRD provided)

components:
  template: null
  instructions: instructions.md
  validation: null

config_source: .bmad/config.yaml

default_output_file: .rvtm/matrix.yaml

variables:
  project_root:
    resolve_from: input
    default: "."

  prd_file:
    resolve_from: input
    default: ""

validation:
  pre_conditions:
    - name: Project directory exists
      check: Directory {{project_root}} must exist

  post_conditions:
    - name: RVTM initialized
      check: Directory .rvtm/ must exist

    - name: Matrix file created
      check: File .rvtm/matrix.yaml must exist